name: 'Risk Space - Auto Crawl & Deploy'

on:
  schedule:
    - cron: '0 0 * * 1'
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  historical-update:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas numpy
      - name: Run historical updates
        run: |
          python scripts/fetch_historical_earthquakes.py || true
          python scripts/fetch_historical_traffic.py || true
          python scripts/build_historical_baseline.py || true
          python scripts/integrate_historical.py || true
      - name: Commit historical outputs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f data/historical/*.json docs/data/historical_crime_baseline.json docs/data/integrated_risk_profile.json
          git diff --cached --quiet || (git commit -m 'auto: weekly historical backfill' && git push)

  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 chardet

      - name: Ensure seen_hashes exists for dedup continuity
        run: |
          mkdir -p data/realtime
          if [ ! -f data/realtime/seen_hashes.json ]; then
            echo "[]" > data/realtime/seen_hashes.json
          fi

      - name: Crawl 47 Prefecture Police HP (primary source)
        run: python scripts/crawl_fushinsha_full.py
        timeout-minutes: 15

      - name: Convert police data to realtime_slim format
        run: python scripts/convert_to_slim.py

      - name: Fetch latest AMeDAS weather
        run: python scripts/cron_weather.py
        continue-on-error: true

      - name: Fetch earthquake data (JMA)
        run: python scripts/cron_earthquake.py
        continue-on-error: true

      - name: Fetch traffic incidents
        run: python scripts/cron_traffic.py
        continue-on-error: true

      - name: Deep Crawl (4x daily at 00/06/12/18 UTC)
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "00" ] || [ "$HOUR" = "06" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "18" ]; then
            echo "Running deep crawl at hour $HOUR"
            python deep_crawl_v3.py
          else
            echo "Skipping deep crawl (hour=$HOUR)"
          fi
        continue-on-error: true
        timeout-minutes: 30

      - name: Check data freshness
        run: python scripts/check_freshness.py
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f docs/data/realtime_slim.json docs/data/amedas_current.json docs/data/summary.json docs/data/events_7days.json docs/data/earthquakes_latest.json docs/data/traffic_incidents_latest.json || true
          git add -f data/realtime/fushinsha_7days/week_events_geocoded.json data/realtime/seen_hashes.json || true
          git add -f docs/data/all_events_v2.json docs/data/deep_crawl.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m 'auto: police-crawl + weather update' && git push)

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Auto-crawl failed: ${new Date().toISOString().slice(0,10)}`,
              body: `Workflow run failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'auto-crawl']
            });
