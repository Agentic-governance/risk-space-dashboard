name: 'Risk Space - Auto Crawl & Deploy'

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 chardet

      - name: Crawl 47 Prefecture Police HP (primary source)
        run: python scripts/crawl_fushinsha_full.py
        timeout-minutes: 15

      - name: Convert police data to realtime_slim format
        run: python scripts/convert_to_slim.py

      - name: Fetch latest AMeDAS weather
        run: python scripts/cron_weather.py
        continue-on-error: true

      - name: Deep Crawl (4x daily at 00/06/12/18 UTC)
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "00" ] || [ "$HOUR" = "06" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "18" ]; then
            echo "Running deep crawl at hour $HOUR"
            python deep_crawl_v3.py
          else
            echo "Skipping deep crawl (hour=$HOUR)"
          fi
        continue-on-error: true
        timeout-minutes: 30

      - name: Check data freshness
        run: python scripts/check_freshness.py
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f docs/data/realtime_slim.json docs/data/amedas_current.json docs/data/summary.json docs/data/events_7days.json docs/data/deep_crawl.json docs/data/all_events_v2.json
          git add -f data/realtime/fushinsha_7days/week_events_geocoded.json data/realtime/seen_hashes.json
          git diff --cached --quiet || (git commit -m 'auto: police-crawl + weather update' && git push)

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Auto-crawl failed: ${new Date().toISOString().slice(0,10)}`,
              body: `Workflow run failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'auto-crawl']
            });
