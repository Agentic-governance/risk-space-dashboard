name: 'Risk Space - Auto Crawl & Deploy'

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 chardet

      - name: Crawl Gaccom
        run: python scripts/cron_crawl.py

      - name: Fetch latest AMeDAS
        run: python scripts/cron_weather.py
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/data/realtime_slim.json docs/data/amedas_current.json docs/data/summary.json
          git diff --cached --quiet || git commit -m 'auto: crawl update' && git push
