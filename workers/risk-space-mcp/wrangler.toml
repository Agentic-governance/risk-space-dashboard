name = "risk-space-mcp"
main = "src/index.js"
compatibility_date = "2024-12-01"

# --- R2 bucket binding ---
[[r2_buckets]]
binding = "RISK_R2"
bucket_name = "risk-space-data"

# --- KV namespace binding ---
[[kv_namespaces]]
binding = "RISK_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# --- Environment variables ---
[vars]
ENVIRONMENT = "production"

# --- Routes (optional — set custom domain in Cloudflare dashboard) ---
# routes = [
#   { pattern = "risk-mcp.example.com/*", zone_name = "example.com" }
# ]
