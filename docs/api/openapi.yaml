openapi: 3.0.0
info:
  title: Risk Space MCP API
  description: |
    犯罪・災害・交通事故・気象を統合したリスク確率空間API。
    UK Police API「位置×カテゴリ×時間」の日本版として設計。
    Cloudflare Workers + R2 上で稼働。
  version: 1.0.0
  contact:
    name: Risk Space MCP
  license:
    name: MIT

servers:
  - url: https://risk-space.workers.dev
    description: Production (Cloudflare Workers)
  - url: http://localhost:8787
    description: Local development

paths:
  /api/v1/risk:
    get:
      operationId: getRiskScore
      summary: 地点のリスクスコアを取得
      description: |
        指定した緯度・経度・半径・時間帯のリスク確率分布を返す。
        犯罪・災害・交通事故・気象の統合スコアを含む。
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
            minimum: 20.0
            maximum: 46.0
          description: 緯度 (WGS84)
        - name: lon
          in: query
          required: true
          schema:
            type: number
            format: double
            minimum: 122.0
            maximum: 154.0
          description: 経度 (WGS84)
        - name: radius_km
          in: query
          required: false
          schema:
            type: number
            format: double
            default: 1.0
            minimum: 0.1
            maximum: 50.0
          description: 検索半径 (km)
        - name: hour
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 23
          description: 時間帯 (0-23)。省略時は現在時刻。
        - name: categories
          in: query
          required: false
          schema:
            type: string
            enum: [crime, disaster, traffic, weather, all]
            default: all
          description: リスクカテゴリフィルタ
      responses:
        '200':
          description: リスクスコア応答
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/hotspots:
    get:
      operationId: getHotspots
      summary: リスクホットスポット一覧
      description: 指定エリア内のリスクが高い地点を期待被害額順に返す。
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: lon
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: radius_km
          in: query
          required: false
          schema:
            type: number
            format: double
            default: 3.0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          description: 返却件数上限
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [crime, disaster, traffic, weather, all]
            default: all
      responses:
        '200':
          description: ホットスポット一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotspotListResponse'

  /api/v1/havens:
    get:
      operationId: getHavens
      summary: 安全避難先一覧
      description: |
        指定地点の周辺にある避難所・24時間薬局・コンビニ・交番などの
        安全スポットを距離順に返す。
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: lon
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: radius_km
          in: query
          required: false
          schema:
            type: number
            format: double
            default: 2.0
        - name: types
          in: query
          required: false
          schema:
            type: string
          description: |
            カンマ区切りのフィルタ: shelter, pharmacy, convenience_store, police_box, hospital
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: 安全スポット一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HavenListResponse'

  /api/v1/fushinsha:
    get:
      operationId: getFushinsha
      summary: 不審者情報一覧
      description: |
        指定エリア内の不審者・声かけ事案を時系列で返す。
        Gaccom安全ナビおよび警視庁データに基づく。
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: lon
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: radius_km
          in: query
          required: false
          schema:
            type: number
            format: double
            default: 2.0
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 30
            maximum: 365
          description: 過去何日分を取得するか
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [声かけ, 痴漢, ひったくり, 不審者, 暴行, 盗撮, all]
            default: all
          description: 事案種別フィルタ
      responses:
        '200':
          description: 不審者情報一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FushinshaListResponse'

  /api/v1/events:
    get:
      operationId: getEvents
      summary: リアルタイムイベント一覧
      description: 犯罪・災害・交通・気象の統合イベントストリーム。
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: lon
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: radius_km
          in: query
          required: false
          schema:
            type: number
            format: double
            default: 5.0
        - name: hours
          in: query
          required: false
          schema:
            type: integer
            default: 24
            maximum: 168
          description: 過去何時間分を取得するか
      responses:
        '200':
          description: イベント一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'

components:
  schemas:
    RiskResponse:
      type: object
      properties:
        lat:
          type: number
        lon:
          type: number
        radius_km:
          type: number
        hour:
          type: integer
        timestamp:
          type: string
          format: date-time
        risk_score:
          type: number
          description: 統合リスクスコア (0-100)
        risk_level:
          type: string
          enum: [low, moderate, elevated, high, critical]
        expected_harm:
          type: number
          description: 期待被害額 (円/年)
        p_escape:
          type: number
          description: 安全避難到達確率 (0-1)
        breakdown:
          type: object
          properties:
            crime:
              $ref: '#/components/schemas/CategoryRisk'
            disaster:
              $ref: '#/components/schemas/CategoryRisk'
            traffic:
              $ref: '#/components/schemas/CategoryRisk'
            weather:
              $ref: '#/components/schemas/CategoryRisk'
        nearby_havens_count:
          type: integer
          description: 半径内の安全スポット数

    CategoryRisk:
      type: object
      properties:
        score:
          type: number
          description: カテゴリ別スコア (0-100)
        probability:
          type: number
          description: 事象発生確率 (0-1)
        top_hazard:
          type: string
          description: 最大リスク要因
        trend:
          type: string
          enum: [increasing, stable, decreasing]

    Hotspot:
      type: object
      properties:
        lat:
          type: number
        lon:
          type: number
        risk_score:
          type: number
        expected_harm:
          type: number
        category:
          type: string
        description:
          type: string
        last_incident:
          type: string
          format: date-time

    HotspotListResponse:
      type: object
      properties:
        count:
          type: integer
        hotspots:
          type: array
          items:
            $ref: '#/components/schemas/Hotspot'

    Haven:
      type: object
      properties:
        lat:
          type: number
        lon:
          type: number
        name:
          type: string
        type:
          type: string
          enum: [shelter, pharmacy, convenience_store, police_box, hospital]
        distance_m:
          type: number
          description: リクエスト地点からの距離 (m)
        is_24h:
          type: boolean
        capacity:
          type: integer
          nullable: true

    HavenListResponse:
      type: object
      properties:
        count:
          type: integer
        havens:
          type: array
          items:
            $ref: '#/components/schemas/Haven'

    FushinshaEvent:
      type: object
      properties:
        lat:
          type: number
        lon:
          type: number
        type:
          type: string
        type_en:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
          description: 発生時刻 (HH:MM)
        target:
          type: string
          description: 被害対象 (児童, 女性, etc.)
        source:
          type: string

    FushinshaListResponse:
      type: object
      properties:
        count:
          type: integer
        events:
          type: array
          items:
            $ref: '#/components/schemas/FushinshaEvent'

    EventListResponse:
      type: object
      properties:
        count:
          type: integer
        events:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              category:
                type: string
                enum: [crime, disaster, traffic, weather]
              lat:
                type: number
              lon:
                type: number
              timestamp:
                type: string
                format: date-time
              severity:
                type: integer
                minimum: 1
                maximum: 5
              title:
                type: string
              description:
                type: string

    Error:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: integer
        request_id:
          type: string
          description: Correlation ID for support requests
        x-identifiers:
          type: object
          description: Stub enterprise identifier fields
          properties:
            figi:
              type: string
              description: Bloomberg FIGI (stub)
            ric:
              type: string
              description: Refinitiv RIC (stub)
            bbg:
              type: string
              description: Bloomberg ticker (stub)

  securitySchemes:
    OAuth2Enterprise:
      type: oauth2
      description: OAuth2 client_credentials flow for enterprise tier
      flows:
        clientCredentials:
          tokenUrl: https://risk-space.workers.dev/oauth/token
          scopes:
            read:risk: Read risk scores and distributions
            read:enterprise: Read enterprise datasets (ELT, tail metrics, ESG)
            read:manifest: Read manifest and audit log
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Community / developer tier API key

  responses:
    BadRequest:
      description: 400 — Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "bad_request"
            message: "lat out of range"
            code: 400
    Unauthorized:
      description: 401 — Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: 429 — Rate limit exceeded
      headers:
        Retry-After:
          schema: {type: integer}
          description: Seconds to wait before retry
        X-RateLimit-Limit:
          schema: {type: integer}
        X-RateLimit-Remaining:
          schema: {type: integer}
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: 500 — Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

security:
  - ApiKeyAuth: []
  - OAuth2Enterprise: [read:risk]

x-sla:
  availability: "99.9%"
  latency_p95_ms: 200
  latency_p99_ms: 500
  rpo_minutes: 15
  rto_minutes: 60
  support_hours: "JST business days 09:00-18:00 (enterprise 24x7)"
  credits:
    below_99_9: "5% of monthly fee"
    below_99_5: "15% of monthly fee"
    below_99_0: "30% of monthly fee"

x-rate-limits:
  community:
    rpm: 60
    rph: 1000
    burst: 10
  developer:
    rpm: 300
    rph: 10000
    burst: 50
  enterprise:
    rpm: 3000
    rph: 200000
    burst: 500
    concurrent: 100

x-identifiers:
  description: Stub enterprise identifier mapping (not yet populated)
  figi: "BBG000000000"
  ric: "0000.T"
  bbg: "0000 JP Equity"
